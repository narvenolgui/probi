<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Многообразие насекомых · 3 класс (ЗПР 7.1)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Arial', 'Helvetica', sans-serif;
            background: #e8f5e9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            margin: 0;
        }
        .app-container {
            max-width: 950px;
            width: 100%;
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 0 15px 30px rgba(0, 40, 0, 0.2);
            padding: 24px 24px 32px;
            border: 3px solid #4caf50;
            transition: all 0.2s;
        }
        h1, h2 {
            color: #1b5e20;
            text-align: center;
            font-weight: 700;
            letter-spacing: 1px;
        }
        h1 { font-size: 2.3rem; margin: 5px 0 10px; text-shadow: 2px 2px 0 #c8e6c9; }
        h2 { font-size: 1.8rem; margin: 15px 0 10px; border-bottom: 3px dotted #81c784; padding-bottom: 8px; }
        .screen { display: block; }
        .hidden { display: none !important; }
        .slide-area {
            background: #f1f8e9;
            border-radius: 30px;
            padding: 20px 20px 25px;
            margin: 10px 0 20px;
            border: 2px solid #a5d6a7;
            box-shadow: inset 0 0 0 2px #ffffff, 0 8px 0 #2e7d32;
        }
        .slide-content {
            min-height: 320px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .slide-text {
            font-size: 1.8rem;
            line-height: 1.4;
            text-align: center;
            color: #1e3a1e;
            margin: 15px 0;
            font-weight: 600;
            background: #fff9c4;
            padding: 20px 15px;
            border-radius: 50px;
            border: 2px solid #f9a825;
            width: 100%;
            box-shadow: 0 4px 0 #b26a00;
        }
        .slide-icon { font-size: 5rem; margin: 5px 0; }
        .fact-badge {
            background: #ffecb3;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 1.5rem;
            border: 2px solid #ffa000;
            color: #3e2723;
            margin-top: 10px;
        }
        .stages {
            display: flex;
            justify-content: space-around;
            align-items: center;
            width: 100%;
            margin: 20px 0 10px;
            flex-wrap: wrap;
        }
        .stage-item {
            background: #e1f5fe;
            border-radius: 30px;
            padding: 15px 10px;
            min-width: 120px;
            text-align: center;
            border: 2px solid #0288d1;
            box-shadow: 0 5px 0 #0277bd;
            font-weight: bold;
        }
        .stage-emoji { font-size: 3.5rem; display: block; }
        .stage-text { font-size: 1.5rem; color: #01579b; }
        .arrow-symbol { font-size: 3rem; color: #f57c00; font-weight: bold; }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 25px;
            gap: 12px;
        }
        button {
            background: #4caf50;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.8rem;
            padding: 16px 30px;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 7px 0 #1b5e20;
            transition: 0.07s;
            border: 2px solid #a5d6a7;
            flex: 1;
            text-align: center;
            min-width: 120px;
            letter-spacing: 2px;
        }
        button.small-btn {
            font-size: 1.5rem;
            padding: 12px 20px;
            box-shadow: 0 5px 0 #1b5e20;
        }
        button:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #1b5e20;
        }
        button:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: 0 7px 0 #1b5e20;
            pointer-events: none;
        }
        .speak-btn {
            background: #ff9800;
            box-shadow: 0 5px 0 #b85e00;
            border-color: #ffe0b2;
            font-size: 1.5rem;
            padding: 10px 25px;
            flex: 0.5;
        }
        .test-container {
            background: #e1f5fe;
            border-radius: 30px;
            padding: 20px;
            border: 3px solid #0288d1;
            margin-top: 15px;
        }
        .question {
            font-size: 2rem;
            font-weight: bold;
            color: #01579b;
            margin-bottom: 25px;
            text-align: center;
            background: #b3e5fc;
            padding: 15px;
            border-radius: 30px;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
            margin-bottom: 25px;
        }
        .option-btn {
            background: #ffffff;
            color: #1e3a1e;
            box-shadow: 0 5px 0 #78909c;
            border: 3px solid #4fc3f7;
            font-size: 1.6rem;
            padding: 18px 5px;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.1s;
            text-align: center;
        }
        .option-btn.selected {
            background: #ffd54f;
            border: 4px solid #f57f17;
            box-shadow: 0 3px 0 #b26a00;
            transform: translateY(2px);
        }
        .feedback {
            font-size: 1.8rem;
            padding: 10px;
            text-align: center;
            border-radius: 40px;
            margin: 15px 0;
            font-weight: bold;
        }
        .correct-feedback { background: #c8e6c9; color: #1b5e20; }
        .wrong-feedback { background: #ffcdd2; color: #b71c1c; }
        .test-nav {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .result-screen {
            text-align: center;
            font-size: 2.5rem;
            padding: 20px;
        }
        .counter {
            font-size: 1.4rem;
            color: #33691e;
            text-align: right;
            margin-bottom: 5px;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            margin: 15px 0;
        }
        .card {
            background: #fff9c4;
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            border: 2px solid #f9a825;
            font-size: 1.4rem;
            font-weight: bold;
        }
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .slide-text { font-size: 1.4rem; }
            button { font-size: 1.4rem; padding: 14px 10px; }
            .options { grid-template-columns: 1fr; }
            .stage-item { min-width: 90px; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="app-container" id="appContainer">
    <h1><i class="fas fa-bug"></i> НАСЕКОМЫЕ <i class="fas fa-butterfly"></i></h1>
    
    <!-- ЭКРАН СЛАЙДОВ -->
    <div id="slidesScreen">
        <div class="counter" id="slideCounter">Слайд 1 / 17</div>
        <div class="slide-area">
            <div class="slide-content" id="slideContent"></div>
            <div style="display: flex; justify-content: center; margin: 10px 0;">
                <button class="speak-btn" id="speakSlideBtn"><i class="fas fa-volume-up"></i> Послушать</button>
            </div>
        </div>
        <div class="nav-buttons">
            <button id="prevSlideBtn" disabled><i class="fas fa-arrow-left"></i> Назад</button>
            <button id="nextSlideBtn">Далее <i class="fas fa-arrow-right"></i></button>
        </div>
        <div style="text-align: center; margin-top: 25px;">
            <button id="goToTestBtn" class="small-btn" style="background: #ffb300; box-shadow:0 5px 0 #b26a00;"><i class="fas fa-pencil-alt"></i> ПЕРЕЙТИ К ТЕСТУ</button>
        </div>
    </div>

    <!-- ЭКРАН ТЕСТА -->
    <div id="testScreen" class="hidden">
        <h2><i class="fas fa-question-circle"></i> ПРОВЕРЬ СЕБЯ</h2>
        <div class="test-container">
            <div id="testHeader">
                <span style="font-size:1.8rem; font-weight:bold;" id="questionNumDisplay">Вопрос 1 из 8</span>
            </div>
            <div class="question" id="questionText"></div>
            <div class="options" id="optionsContainer"></div>
            <div id="feedbackArea" class="feedback"></div>
            <div class="test-nav">
                <button id="checkAnswerBtn" class="small-btn" style="background:#0277bd; box-shadow:0 5px 0 #01416b;">✅ Проверить</button>
                <button id="nextQuestionBtn" class="small-btn" disabled>Следующий ➡️</button>
            </div>
            <div style="margin-top:20px;">
                <button id="backToSlidesFromTest" class="small-btn" style="background:#78909c; box-shadow:0 5px 0 #455a64;"><i class="fas fa-undo-alt"></i> К слайдам</button>
            </div>
        </div>
    </div>

    <!-- ЭКРАН РЕЗУЛЬТАТОВ -->
    <div id="resultScreen" class="hidden">
        <div class="result-screen">
            <i class="fas fa-trophy" style="font-size:5rem; color:#f9a825;"></i>
            <h2>Молодец!</h2>
            <div style="font-size:2.5rem; margin:20px 0;" id="resultMessage"></div>
            <button id="restartLessonBtn" class="small-btn" style="background:#4caf50; box-shadow:0 7px 0 #1b5e20; margin-top:20px;"><i class="fas fa-redo-alt"></i> Посмотреть ещё раз</button>
        </div>
    </div>
</div>

<script>
    (function(){
        "use strict";

        // ---------- СЛАЙДЫ (17 слайдов для 3 класса) ----------
        const slides = [
            { 
                text: "Многообразие насекомых", 
                icon: "🐞🐝🦋", 
                extra: "Самая многочисленная группа животных на Земле: более 1 млн видов!",
                isSpecial: false
            },
            { 
                text: "Кто такие насекомые?", 
                icon: "🔍", 
                extra: "У всех насекомых 6 ног. Тело состоит из трёх частей: голова, грудь, брюшко.",
                isSpecial: false
            },
            { 
                text: "Строение насекомого", 
                icon: "🐜", 
                extra: "На голове — усики и глаза. К груди крепятся 6 ног и крылья. В брюшке — органы пищеварения.",
                isSpecial: false
            },
            { 
                text: "Где живут насекомые?", 
                icon: "🌍", 
                extra: "Везде! В почве, в воде, в воздухе, в лесах, на лугах и даже в наших домах.",
                isSpecial: false
            },
            { 
                text: "Чем питаются насекомые?", 
                icon: "🌿🍖", 
                extra: "Растительноядные едят растения. Хищные охотятся на других насекомых. Всеядные едят всё.",
                isSpecial: false
            },
            { 
                text: "Растительноядные", 
                icon: "🐛🌱", 
                extra: "Гусеницы, тля, колорадский жук. Они питаются листьями и соком растений.",
                isSpecial: false
            },
            { 
                text: "Хищники", 
                icon: "🐞🕷️", 
                extra: "Божья коровка поедает тлю. Стрекоза ловит комаров. Жужелица охотится на гусениц.",
                isSpecial: false
            },
            { 
                text: "Всеядные", 
                icon: "🐜🍂", 
                extra: "Муравьи едят и растения, и других насекомых. Тараканы тоже всеядны.",
                isSpecial: false
            },
            { 
                text: "Жизненный цикл бабочки", 
                icon: "🐛➡️🦋", 
                extra: "Стадии развития: яйцо → гусеница → куколка → бабочка.",
                isStagesSlide: true 
            },
            { 
                text: "Насекомые-опылители", 
                icon: "🐝🌸", 
                extra: "Пчёлы, шмели, бабочки переносят пыльцу с цветка на цветок. Без них не будет плодов!",
                isSpecial: false
            },
            { 
                text: "Общественные насекомые", 
                icon: "🐜👑", 
                extra: "Муравьи и пчёлы живут большими семьями. У них есть королева, рабочие и солдаты.",
                isSpecial: false
            },
            { 
                text: "Насекомые-вредители", 
                icon: "🦗⚠️", 
                extra: "Саранча, колорадский жук, тля. Они уничтожают урожай, и люди с ними борются.",
                isSpecial: false
            },
            { 
                text: "Полезные насекомые", 
                icon: "🐞✅", 
                extra: "Божья коровка, златоглазка, наездник. Они поедают вредителей и защищают наши сады!",
                isSpecial: false
            },
            { 
                text: "Маскировка", 
                icon: "🦗🌿", 
                extra: "Многие насекомые умеют прятаться. Палочник похож на веточку, а кузнечик — на лист.",
                isSpecial: false
            },
            { 
                text: "Интересные факты", 
                icon: "💡", 
                extra: "Стрекоза — самый быстрый летун (до 50 км/ч). Муравей может поднять вес в 50 раз больше своего!",
                isSpecial: false
            },
            { 
                text: "Берегите насекомых!", 
                icon: "🤲❤️", 
                extra: "Не ловите бабочек, не разрушайте муравейники. Насекомые — важная часть природы!",
                isSpecial: false
            },
            { 
                text: "Готовы к тесту?", 
                icon: "📋✅", 
                extra: "Сейчас проверим, что вы запомнили. Нажмите жёлтую кнопку!",
                isSpecial: false
            }
        ];

        // ---------- ТЕСТ (8 вопросов, усложнён для 3 класса) ----------
        const questions = [
            {
                question: "Сколько ног у всех насекомых?",
                options: ["4", "6", "8", "10"],
                correct: 1
            },
            {
                question: "Из каких частей состоит тело насекомого?",
                options: ["Голова, грудь, брюшко", "Голова, туловище, хвост", "Голова, ноги, крылья", "Грудь, брюшко, хвост"],
                correct: 0
            },
            {
                question: "К какой группе по питанию относится божья коровка?",
                options: ["Растительноядные", "Хищники", "Всеядные", "Паразиты"],
                correct: 1
            },
            {
                question: "Какие насекомые живут большими семьями с королевой?",
                options: ["Бабочки", "Муравьи и пчёлы", "Кузнечики", "Жуки"],
                correct: 1
            },
            {
                question: "Зачем нужны насекомые-опылители?",
                options: ["Чтобы было красиво", "Они переносят пыльцу, и появляются плоды", "Они едят вредителей", "Они делают мёд"],
                correct: 1
            },
            {
                question: "Какое насекомое маскируется под веточку?",
                options: ["Кузнечик", "Палочник", "Бабочка", "Муравей"],
                correct: 1
            },
            {
                question: "В какой последовательности развивается бабочка?",
                options: ["Бабочка → куколка → гусеница → яйцо", "Яйцо → гусеница → куколка → бабочка", "Куколка → яйцо → гусеница → бабочка", "Гусеница → яйцо → бабочка → куколка"],
                correct: 1
            },
            {
                question: "Какое насекомое считается опасным вредителем полей?",
                options: ["Божья коровка", "Пчела", "Саранча", "Стрекоза"],
                correct: 2
            }
        ];

        // ---------- ПЕРЕМЕННЫЕ ----------
        let currentSlideIndex = 0;
        let currentQuestionIndex = 0;
        let userAnswers = new Array(questions.length).fill(null);
        let selectedOption = null;

        const slidesScreen = document.getElementById('slidesScreen');
        const testScreen = document.getElementById('testScreen');
        const resultScreen = document.getElementById('resultScreen');
        const slideContent = document.getElementById('slideContent');
        const slideCounter = document.getElementById('slideCounter');
        const prevBtn = document.getElementById('prevSlideBtn');
        const nextBtn = document.getElementById('nextSlideBtn');
        const goToTestBtn = document.getElementById('goToTestBtn');
        const speakSlideBtn = document.getElementById('speakSlideBtn');
        const questionText = document.getElementById('questionText');
        const optionsDiv = document.getElementById('optionsContainer');
        const checkBtn = document.getElementById('checkAnswerBtn');
        const nextQuestionBtn = document.getElementById('nextQuestionBtn');
        const feedbackArea = document.getElementById('feedbackArea');
        const questionNumDisplay = document.getElementById('questionNumDisplay');
        const backToSlidesFromTest = document.getElementById('backToSlidesFromTest');
        const restartLessonBtn = document.getElementById('restartLessonBtn');
        const resultMessage = document.getElementById('resultMessage');

        // ---------- ОТРИСОВКА СЛАЙДОВ ----------
        function renderSlide(index) {
            const slide = slides[index];
            let html = `<div class="slide-icon img-emojii">${slide.icon}</div>`;
            
            if (slide.isStagesSlide) {
                html += `<div class="slide-text">${slide.text}</div>`;
                html += `<div class="stages">
                    <div class="stage-item"><span class="stage-emoji">🥚</span><span class="stage-text">Яйцо</span></div>
                    <div class="arrow-symbol">➡️</div>
                    <div class="stage-item"><span class="stage-emoji">🐛</span><span class="stage-text">Гусеница</span></div>
                    <div class="arrow-symbol">➡️</div>
                    <div class="stage-item"><span class="stage-emoji">🕰️</span><span class="stage-text">Куколка</span></div>
                    <div class="arrow-symbol">➡️</div>
                    <div class="stage-item"><span class="stage-emoji">🦋✨</span><span class="stage-text">Бабочка</span></div>
                </div>`;
                html += `<div class="fact-badge"><i class="fas fa-star"></i> Сначала яйцо, потом гусеница, затем куколка, и наконец — прекрасная бабочка!</div>`;
            } else {
                html += `<div class="slide-text">${slide.text}</div>`;
                if (slide.extra) {
                    html += `<div class="fact-badge"><i class="fas fa-star"></i> ${slide.extra}</div>`;
                }
            }
            
            slideContent.innerHTML = html;
            slideCounter.textContent = `Слайд ${index+1} / ${slides.length}`;
            prevBtn.disabled = (index === 0);
            nextBtn.disabled = (index === slides.length - 1);
            if (index === slides.length - 1) {
                nextBtn.textContent = '🏁 Конец';
            } else {
                nextBtn.innerHTML = 'Далее <i class="fas fa-arrow-right"></i>';
            }
        }

        function nextSlide() {
            if (currentSlideIndex < slides.length - 1) {
                currentSlideIndex++;
                renderSlide(currentSlideIndex);
            }
        }

        function prevSlide() {
            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                renderSlide(currentSlideIndex);
            }
        }

        // Озвучка слайда
        function speakSlideText() {
            const slide = slides[currentSlideIndex];
            let textToSpeak = slide.text + ". ";
            if (slide.isStagesSlide) {
                textToSpeak += "Сначала появляется яйцо. Из него вылупляется гусеница. Затем гусеница превращается в куколку. А из куколки выходит прекрасная бабочка!";
            } else if (slide.extra) {
                textToSpeak += slide.extra;
            }
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                utterance.lang = 'ru-RU';
                utterance.rate = 0.9;
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
            } else {
                alert("Озвучивание не поддерживается.");
            }
        }

        // ---------- ТЕСТ ----------
        function showTestScreen() {
            slidesScreen.classList.add('hidden');
            testScreen.classList.remove('hidden');
            resultScreen.classList.add('hidden');
            resetTestState();
            renderQuestion(currentQuestionIndex);
        }

        function resetTestState() {
            currentQuestionIndex = 0;
            userAnswers = new Array(questions.length).fill(null);
            selectedOption = null;
            nextQuestionBtn.disabled = true;
            checkBtn.disabled = false;
            feedbackArea.innerHTML = '';
            feedbackArea.className = 'feedback';
        }

        function renderQuestion(qIndex) {
            const q = questions[qIndex];
            questionText.textContent = q.question;
            questionNumDisplay.textContent = `Вопрос ${qIndex+1} из ${questions.length}`;
            let optsHtml = '';
            q.options.forEach((opt, idx) => {
                const selectedClass = (userAnswers[qIndex] === idx) ? 'selected' : '';
                optsHtml += `<button class="option-btn ${selectedClass}" data-opt-index="${idx}">${opt}</button>`;
            });
            optionsDiv.innerHTML = optsHtml;
            
            if (userAnswers[qIndex] !== null) {
                checkBtn.disabled = true;
                const isCorrect = (userAnswers[qIndex] === q.correct);
                showFeedback(isCorrect);
                nextQuestionBtn.disabled = false;
            } else {
                checkBtn.disabled = false;
                nextQuestionBtn.disabled = true;
                feedbackArea.innerHTML = '';
                feedbackArea.className = 'feedback';
                selectedOption = null;
            }
            
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (userAnswers[qIndex] !== null) return;
                    const idx = parseInt(btn.dataset.optIndex);
                    selectedOption = idx;
                    document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                });
            });
        }

        function showFeedback(isCorrect) {
            const q = questions[currentQuestionIndex];
            if (isCorrect) {
                feedbackArea.innerHTML = '<i class="fas fa-check-circle"></i> Правильно! Молодец!';
                feedbackArea.className = 'feedback correct-feedback';
            } else {
                feedbackArea.innerHTML = `<i class="fas fa-times-circle"></i> Неверно. Правильный ответ: ${q.options[q.correct]}`;
                feedbackArea.className = 'feedback wrong-feedback';
            }
        }

        function checkAnswer() {
            const qIdx = currentQuestionIndex;
            if (userAnswers[qIdx] !== null) return;
            if (selectedOption === null) { alert("Выбери ответ!"); return; }
            const q = questions[qIdx];
            const isCorrect = (selectedOption === q.correct);
            userAnswers[qIdx] = selectedOption;
            showFeedback(isCorrect);
            checkBtn.disabled = true;
            nextQuestionBtn.disabled = false;
        }

        function nextQuestion() {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                selectedOption = null;
                renderQuestion(currentQuestionIndex);
            } else {
                finishTest();
            }
        }

        function finishTest() {
            testScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            const correctCount = userAnswers.reduce((acc, ans, idx) => acc + (ans === questions[idx].correct ? 1 : 0), 0);
            let msg = `Ты ответил правильно на ${correctCount} из ${questions.length}. `;
            if (correctCount === questions.length) msg += "Отлично! Ты всё запомнил!";
            else if (correctCount >= 5) msg += "Хорошо! Но можно повторить слайды.";
            else msg += "Давай ещё раз посмотрим слайды, и всё получится!";
            resultMessage.textContent = msg;
        }

        function goBackToSlides() {
            testScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            slidesScreen.classList.remove('hidden');
        }

        function restartLesson() {
            currentSlideIndex = 0;
            renderSlide(0);
            slidesScreen.classList.remove('hidden');
            testScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            resetTestState();
        }

        // ---------- ИНИЦИАЛИЗАЦИЯ ----------
        function init() {
            renderSlide(0);
            prevBtn.addEventListener('click', prevSlide);
            nextBtn.addEventListener('click', nextSlide);
            speakSlideBtn.addEventListener('click', speakSlideText);
            goToTestBtn.addEventListener('click', showTestScreen);
            checkBtn.addEventListener('click', checkAnswer);
            nextQuestionBtn.addEventListener('click', nextQuestion);
            backToSlidesFromTest.addEventListener('click', goBackToSlides);
            restartLessonBtn.addEventListener('click', restartLesson);
        }
        init();
    })();
</script>
</body>
</html>
