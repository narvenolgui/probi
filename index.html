<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧠 Нейро-профайл | Экспресс-диагностика</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
            background: linear-gradient(145deg, #f3e9ff 0%, #e0d4f5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), inset 0 2px 4px rgba(255,255,255,0.8);
            padding: 32px 28px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.2s;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #2d1b4e;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            letter-spacing: -0.01em;
            border-bottom: 3px dashed #b185db;
            padding-bottom: 18px;
        }

        h1 span {
            background: #2d1b4e;
            color: white;
            font-size: 1rem;
            padding: 4px 12px;
            border-radius: 40px;
            margin-left: 8px;
        }

        .subhead {
            color: #4a3a5c;
            font-size: 1.1rem;
            margin-bottom: 28px;
            font-weight: 400;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            background: #b185db;
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            box-shadow: 0 6px 12px rgba(177, 133, 219, 0.3);
        }

        .progress-track {
            height: 8px;
            background: #d9c5ec;
            border-radius: 20px;
            margin: 20px 0 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: #2d1b4e;
            border-radius: 20px;
            transition: width 0.35s ease;
            box-shadow: 0 0 10px #a974d9;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 28px 24px;
            box-shadow: 0 12px 28px -8px rgba(45, 27, 78, 0.15);
            border: 1px solid #f0e6ff;
            margin-bottom: 18px;
        }

        .question {
            font-size: 1.7rem;
            font-weight: 700;
            color: #1e1130;
            line-height: 1.3;
            margin-bottom: 28px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .option-btn {
            background: #f9f5ff;
            border: 2px solid #e5d5f5;
            border-radius: 60px;
            padding: 18px 22px;
            font-size: 1.2rem;
            font-weight: 500;
            color: #2d1b4e;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .option-btn:hover {
            background: #ede1ff;
            border-color: #b185db;
            transform: scale(1.01);
            box-shadow: 0 10px 20px -5px rgba(139, 92, 188, 0.2);
        }

        .option-btn.selected {
            background: #2d1b4e;
            border-color: #2d1b4e;
            color: white;
            box-shadow: 0 12px 20px -8px #2d1b4e80;
        }

        .emoji-big {
            font-size: 2rem;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
        }

        .btn {
            background: white;
            border: none;
            padding: 16px 32px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            color: #2d1b4e;
            cursor: pointer;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            border: 1px solid #dac0f0;
            transition: 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #2d1b4e;
            color: white;
            border: none;
            box-shadow: 0 12px 20px -5px #2d1b4e99;
        }

        .btn-primary:hover {
            background: #412a66;
            transform: translateY(-2px);
        }

        .btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .result-area {
            background: #fffaf0;
            border-radius: 28px;
            padding: 24px;
            margin: 20px 0;
            border-left: 10px solid #b185db;
        }

        .print-recommendation {
            font-size: 1.1rem;
            line-height: 1.5;
        }

        .print-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #b185db;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }

        .rec-card {
            background: #f4edfc;
            padding: 22px;
            border-radius: 24px;
            margin: 24px 0;
        }

        .signature {
            font-style: italic;
            margin-top: 30px;
            color: #4a3568;
        }

        @media print {
            body { background: white; padding: 0.2in; }
            .container { box-shadow: none; background: white; padding: 0; }
            .no-print, .nav-buttons, .progress-track, .badge, .btn { display: none !important; }
            .print-only { display: block !important; }
            .result-area { border: 2px solid #2d1b4e; background: white; }
        }

        .print-only { display: none; }
        .inline-diagnostic { font-weight: 700; color: #2d1b4e; }
        .final-actions { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
    </style>
</head>
<body>

<div class="container" id="appContainer">
    <h1>🧠 Нейро-профайл <span>экспресс</span></h1>
    <div class="subhead">
        <span>🧩 для детей 5–12 лет</span>
        <span class="badge" id="stepIndicator">шаг 1/7</span>
    </div>

    <!-- Прогресс-бар -->
    <div class="progress-track no-print">
        <div class="progress-fill" id="progressFill" style="width: 14%"></div>
    </div>

    <!-- Динамический блок вопросов/результата -->
    <div id="dynamicContent" class="card">
        <!-- JS заполнит -->
    </div>

    <!-- Навигация -->
    <div class="nav-buttons no-print" id="navButtons">
        <button class="btn" id="prevBtn" disabled>← Назад</button>
        <button class="btn btn-primary" id="nextBtn">Далее →</button>
    </div>

    <!-- Скрытая область для печати (активируется в конце) -->
    <div id="printableReport" class="print-only"></div>
</div>

<script>
    (function(){
        "use strict";

        // Вопросы (7 штук — быстрая диагностика)
        const questions = [
            {
                text: "Как ребёнок переносит дорогу в машине / качели?",
                options: [
                    { emoji: "🤢", label: "Укачивает, жалуется на тошноту", value: "vestib_low" },
                    { emoji: "🙂", label: "Нормально, но не любит резких поворотов", value: "vestib_mid" },
                    { emoji: "🎢", label: "Обожает, просит быстрее/выше", value: "vestib_high" }
                ]
            },
            {
                text: "Что происходит во время домашнего задания?",
                options: [
                    { emoji: "😴", label: "Быстро устаёт, начинает зевать, 'зависает'", value: "energy_low" },
                    { emoji: "🤯", label: "Психует, бросает ручку, отвлекается на всё", value: "focus_low" },
                    { emoji: "⚡", label: "Делает, но постоянно ёрзает, меняет позу", value: "motor_restless" }
                ]
            },
            {
                text: "Как ребёнок реагирует на громкие звуки? (пылесос, крики, школьный шум)",
                options: [
                    { emoji: "🙉", label: "Закрывает уши, пугается, плачет", value: "audio_sensitive" },
                    { emoji: "😐", label: "Спокойно, не замечает", value: "audio_normal" },
                    { emoji: "🔊", label: "Сам шумит, громко говорит", value: "audio_seeker" }
                ]
            },
            {
                text: "Как обстоят дела с едой и текстурой?",
                options: [
                    { emoji: "🥦", label: "Привередлив, ест только привычное, давится кусочками", value: "oral_defensive" },
                    { emoji: "🍝", label: "Ест разное, но иногда отказывается от нового", value: "oral_mid" },
                    { emoji: "🍭", label: "Тянет в рот несъедобное, грызёт карандаши", value: "oral_seeker" }
                ]
            },
            {
                text: "При письме или рисовании:",
                options: [
                    { emoji: "✍️", label: "Сильно давит на ручку, рвёт бумагу", value: "press_hard" },
                    { emoji: "🖐️", label: "Слабо держит, буквы бледные, быстро устаёт", value: "press_weak" },
                    { emoji: "🌀", label: "Часто меняет хват, вертит ручку", value: "grip_unstable" }
                ]
            },
            {
                text: "Когда нужно выполнить инструкцию из 2-3 шагов (принеси, положи, налей):",
                options: [
                    { emoji: "🐒", label: "Запоминает и делает всё по порядку", value: "seq_good" },
                    { emoji: "🐿️", label: "Отвлекается, делает только первое или путает", value: "seq_mid" },
                    { emoji: "🦥", label: "Смотрит растерянно, нужны повторы", value: "seq_low" }
                ]
            },
            {
                text: "Что вы чаще наблюдаете вечером?",
                options: [
                    { emoji: "🌪️", label: "Перевозбуждение, скачет, не может уснуть", value: "hyper_evening" },
                    { emoji: "😩", label: "Сильная усталость, капризы, 'выжатый лимон'", value: "fatigue_evening" },
                    { emoji: "😌", label: "Относительно спокоен, переключается на сон", value: "evening_ok" }
                ]
            }
        ];

        // Хранилище ответов
        let answers = new Array(questions.length).fill(null);
        let currentIndex = 0;
        let diagnosticFinished = false;

        const appContainer = document.getElementById('appContainer');
        const dynamicContent = document.getElementById('dynamicContent');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressFill = document.getElementById('progressFill');
        const stepIndicator = document.getElementById('stepIndicator');
        const printableReportDiv = document.getElementById('printableReport');
        const navButtons = document.getElementById('navButtons');

        // === Рендер текущего шага ===
        function renderStep(index) {
            if (diagnosticFinished) return;
            
            const q = questions[index];
            const savedAnswer = answers[index];
            
            let html = `<div class="question">${index+1}. ${q.text}</div><div class="options">`;
            
            q.options.forEach((opt, optIdx) => {
                const isSelected = (savedAnswer === opt.value);
                html += `
                    <div class="option-btn ${isSelected ? 'selected' : ''}" data-opt-value="${opt.value}">
                        <span class="emoji-big">${opt.emoji}</span>
                        <span>${opt.label}</span>
                    </div>
                `;
            });
            html += `</div>`;
            
            dynamicContent.innerHTML = html;
            
            // Вешаем слушатели на варианты
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const value = btn.dataset.optValue;
                    answers[index] = value;
                    renderStep(index);  // перерисовать для подсветки
                    updateNavButtons();
                });
            });
            
            updateNavButtons();
            updateProgress();
        }

        // === Обновление кнопок навигации ===
        function updateNavButtons() {
            if (diagnosticFinished) return;
            
            const hasAnswer = answers[currentIndex] !== null;
            
            if (currentIndex === 0) {
                prevBtn.disabled = true;
            } else {
                prevBtn.disabled = false;
            }
            
            if (currentIndex === questions.length - 1) {
                nextBtn.textContent = '🧾 Получить результат';
            } else {
                nextBtn.textContent = 'Далее →';
            }
            
            // Можно переходить дальше, только если есть ответ
            if (!hasAnswer) {
                nextBtn.disabled = true;
            } else {
                nextBtn.disabled = false;
            }
            
            stepIndicator.textContent = `шаг ${currentIndex+1}/${questions.length}`;
        }

        function updateProgress() {
            const percent = ((currentIndex + 1) / questions.length) * 100;
            progressFill.style.width = percent + '%';
        }

        // === Переходы ===
        function goToNext() {
            if (diagnosticFinished) return;
            if (answers[currentIndex] === null) return;
            
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                renderStep(currentIndex);
            } else {
                // Завершить диагностику
                finishDiagnostic();
            }
        }

        function goToPrev() {
            if (diagnosticFinished) return;
            if (currentIndex > 0) {
                currentIndex--;
                renderStep(currentIndex);
            }
        }

        // === Генерация персональных рекомендаций (на основе ответов) ===
        function generateRecommendations() {
            const recs = [];
            const traits = { motor: [], sensory: [], regulation: [] };
            
            // Анализ ответов
            if (answers[0] === 'vestib_low') {
                recs.push("🔹 Вестибулярная система чувствительна. Перед уроками — 2 мин покачиваний на фитболе или качелях.");
                traits.motor.push("укачивает");
            } else if (answers[0] === 'vestib_high') {
                recs.push("🔹 Любит интенсивное движение. Давайте 5-минутные активные паузы (попрыгать, повисеть) между заданиями.");
                traits.motor.push("ищет движение");
            }
            
            if (answers[1] === 'energy_low') {
                recs.push("🔹 Быстрая истощаемость. Рекомендуем «сенсорный перекус»: хрустящее яблоко/морковка перед домашкой.");
                traits.regulation.push("истощение");
            } else if (answers[1] === 'focus_low') {
                recs.push("🔹 Сложности с концентрацией. Включайте «белый шум» (дождь/вентилятор) на фоне — это снижает отвлекаемость.");
                traits.regulation.push("отвлекаемость");
            } else if (answers[1] === 'motor_restless') {
                recs.push("🔹 Двигательное беспокойство. Разрешите делать уроки стоя или лёжа на ковре, используйте эспандер под столом.");
                traits.motor.push("ёрзает");
            }
            
            if (answers[2] === 'audio_sensitive') {
                recs.push("🔹 Чувствителен к шуму. В школе помогут беруши-невидимки или шумоподавляющие наушники на контрольных.");
                traits.sensory.push("шум");
            } else if (answers[2] === 'audio_seeker') {
                recs.push("🔹 Ищет звуковую стимуляцию. Давайте слушать ритмичную музыку без слов во время рутинных дел.");
                traits.sensory.push("ищет звук");
            }
            
            if (answers[3] === 'oral_defensive') {
                recs.push("🔹 Пищевая избирательность. Играйте с трубочками, свистками, дуйте на ватку — это мягко развивает оральную сферу.");
                traits.sensory.push("еда");
            } else if (answers[3] === 'oral_seeker') {
                recs.push("🔹 Оральная потребность. Купите жевательную трубочку / прорезыватель, чтобы не грыз карандаши.");
                traits.sensory.push("грызёт");
            }
            
            if (answers[4] === 'press_hard') {
                recs.push("🔹 Сильный нажим — признак напряжения. Делайте массаж кистей мячиком-ёжиком и упражнения с пластилином.");
                traits.motor.push("нажим");
            } else if (answers[4] === 'press_weak') {
                recs.push("🔹 Слабые мышцы рук. Полезно: отжимания от стены, «тачка» (ходить на руках), игры с прищепками.");
                traits.motor.push("слабые руки");
            }
            
            if (answers[5] === 'seq_low' || answers[5] === 'seq_mid') {
                recs.push("🔹 Удержание инструкций — зона роста. Играйте в «робота»: давайте 2-3 команды подряд, постепенно усложняя.");
                traits.regulation.push("память");
            }
            
            if (answers[6] === 'hyper_evening') {
                recs.push("🔹 Перевозбуждение к вечеру. Введите «тяжёлую работу»: носить пакет с крупой, толкать стул, укутываться в плед.");
                traits.regulation.push("перегрузка");
            } else if (answers[6] === 'fatigue_evening') {
                recs.push("🔹 Истощение. Укоротите вечерние занятия, добавьте массаж спины и тёплую ванну с магниевой солью.");
                traits.regulation.push("усталость");
            }

            // Если рекомендаций мало, добавляем универсальную
            if (recs.length < 2) {
                recs.push("🔹 Нейродинамика в пределах нормы. Для поддержки: 10 минут ползания «по-пластунски» 3 раза в неделю.");
            }
            
            return { recs, traits };
        }

        function finishDiagnostic() {
            diagnosticFinished = true;
            const { recs } = generateRecommendations();
            
            // Скрываем прогресс и навигацию
            navButtons.style.display = 'none';
            document.querySelector('.progress-track').style.display = 'none';
            stepIndicator.style.display = 'none';
            
            const now = new Date();
            const dateStr = now.toLocaleDateString('ru-RU', { day:'numeric', month:'long', year:'numeric' });
            
            // Блок с результатом (для экрана)
            let recsHtml = '';
            recs.forEach(r => { recsHtml += `<p style="margin-bottom: 14px; font-size:1.1rem">${r}</p>`; });
            
            const screenResult = `
                <div style="text-align: center; margin-bottom: 20px;">
                    <span style="font-size: 4rem;">🧠✨</span>
                    <h2 style="color:#2d1b4e; margin: 10px 0;">Ваш нейро-профайл готов</h2>
                    <p style="color: #4a3a5c;">${dateStr} · экспресс-диагностика</p>
                </div>
                <div class="result-area">
                    <div style="font-weight:700; font-size:1.4rem; margin-bottom: 20px;">📋 Рекомендации нейропсихолога</div>
                    ${recsHtml}
                    <div class="signature">— ваш психолого-педагогический центр</div>
                </div>
                <div class="final-actions">
                    <button class="btn btn-primary" id="printBtn">🖨️ Распечатать / сохранить PDF</button>
                    <button class="btn" id="restartBtn">🔄 Пройти заново</button>
                </div>
                <p style="margin-top: 20px; opacity:0.7;">Нажмите «Распечатать» — откроется версия для печати.</p>
            `;
            
            dynamicContent.innerHTML = screenResult;
            
            document.getElementById('printBtn').addEventListener('click', ()=>{
                window.print();
            });
            
            document.getElementById('restartBtn').addEventListener('click', ()=>{
                location.reload();
            });
            
            // Заполняем скрытую область для печати
            const printRecsHtml = recs.map(r => `<div style="margin-bottom: 18px; font-size: 15pt;">✔️ ${r}</div>`).join('');
            printableReportDiv.innerHTML = `
                <div style="font-family: 'Segoe UI', Arial; max-width:700px; margin:0 auto; padding:30px;">
                    <div style="display:flex; align-items:center; gap:15px; border-bottom:3px solid #2d1b4e; padding-bottom:20px; margin-bottom:25px;">
                        <span style="font-size:42px;">🧠</span>
                        <div>
                            <h1 style="color:#2d1b4e; margin:0; font-size:32px;">Нейро-профайл ребёнка</h1>
                            <p style="color:#555; margin:5px 0 0;">Экспресс-диагностика · ${dateStr}</p>
                        </div>
                    </div>
                    <div style="background:#f8f2ff; border-radius:30px; padding:30px; margin:20px 0;">
                        <h2 style="color:#1e1130; margin-top:0;">🎯 Индивидуальные рекомендации</h2>
                        ${printRecsHtml}
                    </div>
                    <div style="margin-top: 35px; background: #e9ddf5; padding: 20px; border-radius: 24px;">
                        <p style="font-weight:600;">✨ Лайфхак от центра:</p>
                        <p>Выполняйте хотя бы 1 рекомендацию в день в течение недели — и вы заметите разницу в поведении и учёбе.</p>
                    </div>
                    <p style="margin-top: 30px; color:#4a3a5c; text-align:right; font-style:italic;">С заботой о развитии,<br>психолого-педагогический центр</p>
                    <hr style="margin: 30px 0; border:1px dashed #b185db;">
                    <p style="color:#666;">📍 Запись на углублённую диагностику: +7 (___) ___-__-__</p>
                </div>
            `;
            
            // прячем лишнее при печати
        }

        // === Инициализация ===
        function init() {
            renderStep(0);
            
            nextBtn.addEventListener('click', goToNext);
            prevBtn.addEventListener('click', goToPrev);
            
            // Обработка печати — скрываем контейнер с кнопками, показываем print-only
            window.onbeforeprint = function() {
                if (diagnosticFinished) {
                    dynamicContent.style.display = 'none';
                    printableReportDiv.style.display = 'block';
                    document.querySelector('.subhead')?.style.setProperty('display', 'none', 'important');
                }
            };
            window.onafterprint = function() {
                if (diagnosticFinished) {
                    dynamicContent.style.display = 'block';
                    printableReportDiv.style.display = 'none';
                    document.querySelector('.subhead')?.style.removeProperty('display');
                }
            };
        }

        init();
    })();
</script>
</body>
</html>
